<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; line-height: 1.6; color: #111; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; overflow-x: auto; }
    hr { border: 0; border-top: 1px solid #d0d7de; margin: 24px 0; }
    .breadcrumbs { font-size: 14px; color: #57606a; margin-bottom: 16px; }
    .nav-box { background: #f6f8fa; padding: 16px; border-radius: 10px; margin: 24px 0; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
